
# ── Model-independent pipeline dimensions (shared by train + decode) ──
# emb_dim is NOT set here: it depends on the Whisper model and is derived from
# the `model` field automatically (tiny.en=384, base.en=512, small.en=768).
dims: &dims
  n_ctx: 1500           # Whisper encoder frames (same for tiny/base/small)
  neural_dim: 512       # neural features per 20 ms bin
  frame_samples: 320    # 16 kHz audio samples per encoder frame

workflow:
  steps:
    - generate_audio
    - extract_features
    - train

# ── Stage 1: Audio Generation (StyleTTS2) ───────────────────
generate_audio:
  data_dir: data/raw/hdf5_data_final
  output_dir: data/generated_audio
  split: train                # "train" or "val"
  num_workers: 4
  threads_per_worker: 1

# ── Stage 2: Whisper Feature Extraction ─────────────────────
# One run extracts features for every model listed below, writing each set to
# its own folder: data/features/<model>/<split>/<session>/...
extract_features:
  audio_dir: data/generated_audio
  output_dir: data/features
  models: [tiny.en, base.en, small.en]   # Whisper targets to extract
  num_workers: 4
  threads_per_worker: 1

# ── Stage 3: Training ──────────────────────────────────────
# Train ONE model per run. Set `model` to pick the Whisper target; emb_dim, the
# feature folder (features_dir/<model>) and the checkpoint folder
# (ckpt_dir/<model>) are all derived from it, so the three sizes never collide.
train:
  <<: *dims
  model: tiny.en            # tiny.en | base.en | small.en
  raw_dir: data/raw/hdf5_data_final
  features_dir: data/features   # base dir; the <model> subfolder is appended
  epochs: 1000
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 1.0e-3      # stronger L2 to fight the train/val gap (was 1e-4)
  num_workers: 8          # DataLoader workers (persist across epochs)
  prefetch_factor: 4      # batches each worker stages ahead of the GPU
  conv_channels: 256
  hidden: 256
  gru_layers: 3             # smaller temporal model — 8 layers memorised (was 8)
  dropout: 0.3              # back to the model's design default (was 0.1)
  session_adapt: linear     # per-session (day-specific) input layer to absorb
                            # cross-session drift: linear (per-day W+b, most
                            # expressive) | affine (per-day scale+bias, lighter) |
                            # none (no session conditioning). Identity-initialised.

  dec_loss_weight: 0.8      # decoder-in-the-loop CE loss weight (0 = off; try 0.5-1.0)

  ckpt_dir: checkpoints     # base dir; the <model> subfolder is appended
  wer_every: 20             # run WER eval every N epochs (0 = off)
  wer_trials: 1450          # honest WER estimate for checkpoint selection (was 30)
  patience: 20              # stop if val loss hasn't improved for this many epochs (0 = off)
  
  # ── neural-input regularisation (dataset.py) ──
  normalize: true           # per-session, per-channel z-scoring of neural input
  augment: true             # train-only augmentation (noise / channel-drop / scale / jitter)
  aug_noise_std: 0.15       # Gaussian noise stddev (on normalised features)
  aug_channel_drop: 0.1     # fraction of the 512 channels zeroed per trial
  aug_scale: 0.1            # amplitude jitter: multiply by 1 +/- this
  aug_time_jitter: 2        # random temporal shift in bins (+/-)
  limit: 0                  # cap trials per split for debugging (0 = no cap)
  device: auto                # "auto", "cuda", or "cpu"

# ── Stage 4: Decoding / WER evaluation ─────────────────────
decode:
  <<: *dims
  # Everything model-specific (which Whisper decoder, emb_dim, the <model>
  # feature subfolder) is read from the checkpoint's saved args, so just point
  # `ckpt` at the run you want to score.
  ckpt: checkpoints/tiny.en_gru3_h256_conv256_drop0.3_lr3e-04_wd1e-03_bs64_sadapt-linear_decw0.8_norm1_aug1/best_wer.pt   # checkpoint to decode with
  split: val                      # "train" or "val"
  raw_dir: data/raw/hdf5_data_final
  features_dir: data/features     # base dir; the <model> subfolder is appended
  beam_size: 5                    # beam width (1 = greedy)
  limit: 0                        # cap trials (0 = decode all)
  out: results/val_wer.csv        # per-trial WER output CSV
  device: auto                    # "auto", "cuda", or "cpu"
